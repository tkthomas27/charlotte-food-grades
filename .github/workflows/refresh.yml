name: Weekly data refresh + deploy

on:
  schedule:
    - cron: "17 9 * * 1"   # Mondays 09:17 UTC
  workflow_dispatch:

permissions:
  contents: write   # push refreshed site data + upload the DuckDB release asset

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download previous database
        run: |
          mkdir -p data
          gh release download data-latest --pattern db.duckdb --dir data --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Weekly update (scrape -> geocode -> export)
        run: python -m pipeline.ingest weekly

      - name: Publish refreshed database
        run: |
          gh release upload data-latest data/db.duckdb --clobber
          gh release edit data-latest --notes "Refreshed $(date -u +%Y-%m-%dT%H:%MZ)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit refreshed site data
        # Vercel (Git integration, root dir = site/) redeploys on this push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data
          git diff --cached --quiet || git commit -m "Weekly data refresh $(date -u +%Y-%m-%d)"
          git push
